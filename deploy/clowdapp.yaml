---
apiVersion: v1
kind: Template
metadata:
  name: widget-layout-backend
objects:
  - apiVersion: cloud.redhat.com/v1alpha1
    kind: ClowdApp
    metadata: 
      name: widget-layout-backend
    spec:
      envName: ${ENV_NAME}
      database:
        name: widget-layout-backend
      deployments:
        - name: api
          minReplicas: ${{MIN_REPLICAS}}
          webServices:
            public:
              apiPath: widget-layout
              enabled: true
              whitelistPaths:
                - /api/widget-layout/v1/openapi.json
                - /api/widget-layout/v1/openapi.yaml
          podSpec:
            image: ${IMAGE}:${IMAGE_TAG}
            # containers:
            #   # MCP Sidecar Container
            #   - name: mcp-sidecar
            #     image: ${MCP_SIDECAR_IMAGE}:${MCP_SIDECAR_IMAGE_TAG}
            #     ports:
            #       - containerPort: 8001
            #         name: mcp
            #         protocol: TCP
            #     env:
            #       - name: PORT
            #         value: "8001"
            #       - name: WIDGET_LAYOUT_API_URL
            #         value: "http://localhost:8000"
            #       - name: LOG_LEVEL
            #         value: ${LOG_LEVEL}
            #       - name: NODE_ENV
            #         value: "production"
            #     resources:
            #       limits:
            #         cpu: ${CPU_LIMIT_MCP_SIDECAR}
            #         memory: ${MEMORY_LIMIT_MCP_SIDECAR}
            #       requests:
            #         cpu: ${CPU_REQUEST_MCP_SIDECAR}
            #         memory: ${MEMORY_REQUEST_MCP_SIDECAR}
            #     livenessProbe:
            #       httpGet:
            #         path: /healthz
            #         port: 8001
            #         scheme: HTTP
            #       initialDelaySeconds: 10
            #       periodSeconds: 10
            #       timeoutSeconds: 3
            #       failureThreshold: 3
            #     readinessProbe:
            #       httpGet:
            #         path: /ready
            #         port: 8001
            #         scheme: HTTP
            #       initialDelaySeconds: 5
            #       periodSeconds: 5
            #       timeoutSeconds: 3
            #       failureThreshold: 3
            initContainers:
              - name: run-db-migration
                command:
                  - bash
                  - -c
                  - widget-layout-backend-migrate
            livenessProbe:
              failureThreshold: 3
              httpGet:
                path: /healthz
                port: 8000
                scheme: HTTP
              initialDelaySeconds: 30
              periodSeconds: 5
              successThreshold: 1
              timeoutSeconds: 120          
            readinessProbe:
              failureThreshold: 3
              httpGet:
                path: /healthz
                port: 8000
                scheme: HTTP
              initialDelaySeconds: 30
              periodSeconds: 5
              successThreshold: 1
              timeoutSeconds: 120
            env:
            - name: CLOWDER_ENABLED
              value: ${CLOWDER_ENABLED}
            - name: LOG_LEVEL 
              value: ${LOG_LEVEL}
            # FEO generated base layout config
            - name: BASE_LAYOUTS
              valueFrom:
                configMapKeyRef:
                  name: ${FEO_BASE_LAYOUTS_CONFIGMAP}
                  key: base-widget-dashboard-templates.json
                  optional: true
            # FEO generated widget mapping config
            - name: WIDGET_MAPPING
              valueFrom:
                configMapKeyRef:
                  name: ${FEO_WIDGET_MAPPING_CONFIGMAP}
                  key: widget-registry.json
                  optional: true
            resources:
              limits:
                cpu: ${CPU_LIMIT_WIDGET_LAYOUT}
                memory: ${MEMORY_LIMIT_WIDGET_LAYOUT}
              requests:
                cpu: ${CPU_REQUEST_WIDGET_LAYOUT}
                memory: ${MEMORY_REQUEST_WIDGET_LAYOUT}

parameters:
- description: MCP Sidecar image
  name: MCP_SIDECAR_IMAGE
  value: quay.io/redhat-services-prod/hcc-platex-services-tenant/widget-layout-backend/mcp-sidecar
- description: MCP Sidecar image tag
  name: MCP_SIDECAR_IMAGE_TAG
  required: true
- description: MCP Sidecar CPU limit
  name: CPU_LIMIT_MCP_SIDECAR
  value: 200m
- description: MCP Sidecar memory limit
  name: MEMORY_LIMIT_MCP_SIDECAR
  value: 256Mi
- description: MCP Sidecar CPU requests
  name: CPU_REQUEST_MCP_SIDECAR
  value: 100m
- description: MCP Sidecar memory requests
  name: MEMORY_REQUEST_MCP_SIDECAR
  value: 128Mi
- description: Determines Clowder deployment
  name: CLOWDER_ENABLED
  value: "true"
- description: ClowdEnv Name
  name: ENV_NAME
  value: "widget-layout-backend"
  required: true
- description: The log level for the application
  name: LOG_LEVEL
  value: warn
- description: Cpu limit of service
  name: CPU_LIMIT_WIDGET_LAYOUT
  value: 500m
- description: memory limit of service
  name: MEMORY_LIMIT_WIDGET_LAYOUT
  value: 512Mi
- description: Cpu requests of service
  name: CPU_REQUEST_WIDGET_LAYOUT
  value: 250m
- description: Memory requests of service
  name: MEMORY_REQUEST_WIDGET_LAYOUT
  value: 256Mi
- name: MIN_REPLICAS
  value: '3'
- description: Image tag
  name: IMAGE_TAG
  required: true
- description: Image name
  name: IMAGE
  value: quay.io/redhat-services-prod/hcc-platex-services-tenant/widget-layout-backend/widget-layout-backend
- description: FEO generated base layout chrome configmap
  name: FEO_BASE_LAYOUTS_CONFIGMAP
  value: base-widget-dashboard-templates-cfg
- description: FEO generated widget mapping chrome configmap
  name: FEO_WIDGET_MAPPING_CONFIGMAP
  value: widget-registry-cfg
